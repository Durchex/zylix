# Netlify config for apps/web — see docs/DEPLOYMENT.md for the full runbook.
#
# base = "apps/web" so the Next.js Runtime plugin finds apps/web/.next as the
# build output. The install/build command still cd's to the monorepo root
# first, because npm workspaces need the root package.json + lockfile to
# resolve apps/web's hoisted dependencies (same reasoning as apps/web/vercel.json).

[build]
  base = "apps/web"
  command = "cd ../.. && npm ci && npm run build:web"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# API_URL is set as a Netlify environment variable in the dashboard (Site
# configuration -> Environment variables), not here, since its value is the
# Render API's URL and isn't known until that service is deployed.
