version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: zylix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zylix
      POSTGRES_PASSWORD: zylix
      POSTGRES_DB: zylix
    ports:
      - "5432:5432"
    volumes:
      - zylix_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zylix"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zylix-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - zylix_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  zylix_postgres_data:
  zylix_redis_data:
