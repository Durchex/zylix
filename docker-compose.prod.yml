# Self-hosted production stack (VPS / bare Docker host) — an alternative to
# the Vercel + Railway/Render split documented as the primary path in
# docs/DEPLOYMENT.md. Not used by CI; not deployed anywhere from this
# sandbox (no Docker daemon available here — see docs/DEPLOYMENT.md §5).
#
# Usage:
#   cp .env.example .env   # fill in real production secrets first
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml exec api npx prisma migrate deploy

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: zylix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: zylix
    volumes:
      - zylix_postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zylix"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - zylix_redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://zylix:${POSTGRES_PASSWORD}@postgres:5432/zylix?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        API_URL: http://api:4000
    restart: unless-stopped
    environment:
      API_URL: http://api:4000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  zylix_postgres_prod_data:
  zylix_redis_prod_data:
