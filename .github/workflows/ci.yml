name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Tests in both apps run entirely against a mocked Prisma client (see
# docs/TESTING.md) — no Postgres/Redis service containers are needed here.
jobs:
  api:
    name: API — lint, typecheck, test
    runs-on: ubuntu-latest
    env:
      # Only what apps/api/src/config/env.ts requires to parse successfully.
      # Real secrets are never used in CI — nothing here talks to a live DB,
      # Redis instance, or payment provider.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-at-least-32-characters-long
      JWT_REFRESH_SECRET: ci-refresh-secret-at-least-32-characters-long
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint:api
      - run: npm --prefix apps/api exec tsc -- --noEmit
      - run: npm run test:api

  web:
    name: Web — lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint:web
      - run: npm --prefix apps/web exec tsc -- --noEmit
      - run: npm run test:web

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: [api, web]
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-at-least-32-characters-long
      JWT_REFRESH_SECRET: ci-refresh-secret-at-least-32-characters-long
      API_URL: http://localhost:4000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
